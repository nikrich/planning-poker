  <path d="M32 18 C32 18 21 27 21 34 C21 38.4 24.4 41 27.5 41 C29.2 41 30.6 40.2 31 39.2 C30.6 42.5 29.4 44.5 27.5 46 L36.5 46 C34.6 44.5 33.4 42.5 33 39.2 C33.4 40.2 34.8 41 36.5 41 C39.6 41 43 38.4 43 34 C43 27 32 18 32 18 Z" fill="#16308C"/>
