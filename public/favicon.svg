<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Planning Poker">
  <!-- Poker chip -->
  <circle cx="32" cy="32" r="30" fill="#3A63F5"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#1E3FB8" stroke-width="2"/>

  <!-- Rim notches -->
  <g fill="#FFFFFF">
    <g transform="rotate(0 32 32)"><rect x="29" y="2.5" width="6" height="8" rx="2"/></g>
    <g transform="rotate(45 32 32)"><rect x="29" y="2.5" width="6" height="8" rx="2"/></g>
    <g transform="rotate(90 32 32)"><rect x="29" y="2.5" width="6" height="8" rx="2"/></g>
    <g transform="rotate(135 32 32)"><rect x="29" y="2.5" width="6" height="8" rx="2"/></g>
    <g transform="rotate(180 32 32)"><rect x="29" y="2.5" width="6" height="8" rx="2"/></g>
    <g transform="rotate(225 32 32)"><rect x="29" y="2.5" width="6" height="8" rx="2"/></g>
    <g transform="rotate(270 32 32)"><rect x="29" y="2.5" width="6" height="8" rx="2"/></g>
    <g transform="rotate(315 32 32)"><rect x="29" y="2.5" width="6" height="8" rx="2"/></g>
  </g>

